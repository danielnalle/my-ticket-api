services:
  postgres_db:
    image: postgres:15-alpine
    container_name: my-ticket-postgres
    restart: always
    environment:
      POSTGRES_USER: ticket_admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: my_ticket_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis_cache:
    image: redis:7-alpine
    container_name: my-ticket-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
